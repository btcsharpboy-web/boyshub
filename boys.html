<!DOCTYPE html>
<html>
<head>
    <title>Boyshub Trading</title>
    <style>
        body { background: #0b0c0d; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .hub-container { background: #151717; padding: 30px; border-radius: 15px; border: 1px solid #333; max-width: 450px; margin: 50px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #ff444f; letter-spacing: 2px; }
        input { width: 85%; padding: 12px; margin: 20px 0; background: #000; border: 1px solid #444; color: #00ff41; border-radius: 5px; text-align: center; }
        .btn { background: #ff444f; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 90%; transition: 0.3s; }
        .btn:hover { background: #e03a44; }
        #log-area { background: #000; padding: 15px; height: 120px; overflow-y: auto; font-family: monospace; font-size: 12px; margin-top: 20px; text-align: left; border: 1px solid #222; color: #aaa; }
        .success { color: #4caf50; }
    </style>
</head>
<body>

    <div class="hub-container">
        <h1>BOYSHUB</h1>
        <p style="color: #888;">Connect your account to begin</p>
        <input type="password" id="tokenInput" placeholder="Paste API Token Here">
        <button id="connectBtn" class="btn">CONNECT ACCOUNT</button>
        <div id="log-area">> Waiting for connection...</div>
    </div>

    <script>
        const APP_ID = '36544';
        let ws;

        document.getElementById('connectBtn').onclick = function() {
            const token = document.getElementById('tokenInput').value.trim();
            const log = document.getElementById('log-area');
            
            if(!token) return alert("Please paste a token!");

            log.innerText = "> Connecting to Deriv Servers...";
            ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);

            ws.onopen = () => {
                log.innerText += "\n> Tunnel Opened. Authorizing...";
                ws.send(JSON.stringify({ authorize: token }));
            };
            
            ws.onmessage = (msg) => {
                const res = JSON.parse(msg.data);
                if (res.error) {
                    log.innerText += "\n> Error: " + res.error.message;
                    log.style.color = "#ff444f";
                }
                if (res.msg_type === 'authorize') {
                    log.innerText = "> SUCCESS! Welcome " + res.authorize.loginid;
                    log.className = "success";
                    // You can add your bot start logic here later
                }
            };

            ws.onerror = () => {
                log.innerText += "\n> Connection Failed. Check internet.";
            };
        };
    </script>
</body>
</html>
